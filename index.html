<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiết kế thiệp ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #e91e63; --light-pink: #fce4ec; --text: #5d4037; }
        body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: var(--pink); margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--text); font-size: 0.9rem; text-align: left; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #f8bbd0; border-radius: 10px; box-sizing: border-box; outline: none; font-family: inherit; }
        input:focus { border-color: var(--pink); }
        button { width: 100%; margin-top: 20px; padding: 15px; border: none; background: var(--pink); color: white; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #c2185b; }
        
        #result { margin-top: 25px; display: none; border-top: 2px dashed #f8bbd0; padding-top: 20px; }
        #qrcode { display: inline-block; margin: 15px 0; padding: 10px; background: white; border-radius: 15px; }
        #qrcode img { display: block; margin: 0 auto; }
        
        .download-btn { background: #4caf50; margin-top: 10px; }
        .download-btn:hover { background: #388e3c; }
        .hint { font-size: 0.8rem; color: #888; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Thiết kế thiệp ❤️</h2>
        <label>Ngày kỷ niệm:</label>
        <input type="date" id="date" value="2024-05-16">
        
        <label>Mật mã mở thư:</label>
        <input type="text" id="pass" placeholder="Ví dụ: 1605">
        
        <label>Lời nhắn gửi:</label>
        <textarea id="msg" rows="3" placeholder="Lời chúc ngọt ngào..."></textarea>
        
        <label>Chữ rơi (cách nhau bằng dấu phẩy):</label>
        <input type="text" id="falling" placeholder="Yêu em, Nhớ em, <3...">

        <button onclick="generate()">Tạo Mã QR Trái Tim</button>

        <div id="result">
            <div id="qrcode"></div>
            <p class="hint">Quét mã để xem điều bất ngờ!</p>
            <button class="download-btn" onclick="downloadQR()">Tải mã QR về máy</button>
        </div>
    </div>

    <script>
    function generate() {
        const d = document.getElementById('date').value;
        const p = document.getElementById('pass').value;
        const m = encodeURIComponent(document.getElementById('msg').value);
        const f = encodeURIComponent(document.getElementById('falling').value || "Love, Miss You");

        if(!d || !p || !m) return alert("Điền đủ thông tin nhé!");

        let base = window.location.href.split('?')[0].split('#')[0];
        if (base.endsWith('index.html')) base = base.replace('index.html', '');
        if (!base.endsWith('/')) base += '/';

        const finalUrl = `${base}letter.html?d=${d}&p=${p}&m=${m}&f=${f}`;

        const qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = "";

        // TẠO MÃ QR VỚI TRÁI TIM Ở GIỮA
        const el = kjua({
    render: 'canvas',
    text: finalUrl,
    size: 400,          // Tăng kích thước lên 400 hoặc 500 để các chấm rõ hơn
    fill: '#e91e63', 
    back: '#ffffff',
    rounded: 0,         // QUAN TRỌNG: Để là 0 (hình vuông) khi lời nhắn dài để dễ quét hơn
    quiet: 4,           // Tăng khoảng trắng xung quanh mã QR
    mode: 'plain'       // Bỏ hình trái tim ở giữa nếu lời nhắn quá dài để ưu tiên dữ liệu
});

        qrContainer.appendChild(el);
        document.getElementById('result').style.display = 'block';
    }

    function downloadQR() {
        const canvas = document.querySelector('#qrcode canvas');
        if (!canvas) return;
        const link = document.createElement('a');
        link.download = 'Ma-QR-Trai-Tim.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>
</body>
</html>
