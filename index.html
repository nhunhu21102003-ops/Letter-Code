<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lời yêu thương ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #e91e63; --light-pink: #fce4ec; --text: #5d4037; }
        body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: var(--pink); margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--text); font-size: 0.9rem; text-align: left; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #f8bbd0; border-radius: 10px; box-sizing: border-box; outline: none; font-family: inherit; }
        input:focus { border-color: var(--pink); }
        
        button { width: 100%; margin-top: 15px; padding: 12px; border: none; background: var(--pink); color: white; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .download-btn { background: #4caf50; }
        .copy-btn { background: #2196f3; } /* Màu xanh dương cho nút Copy */
        button:hover { opacity: 0.9; transform: scale(1.02); }
        
        #result { margin-top: 25px; display: none; border-top: 2px dashed #f8bbd0; padding-top: 20px; }
        #qrcode { display: inline-block; margin: 15px 0; padding: 10px; background: white; border-radius: 15px; }
        .link-display { background: #f9f9f9; padding: 10px; border-radius: 8px; font-size: 0.75rem; word-break: break-all; color: #888; border: 1px solid #eee; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Lời yêu thương ❤️</h2>
        <label>Ngày kỷ niệm:</label>
        <input type="date" id="date" value="2024-05-16">
        
        <label>Mật mã mở thư:</label>
        <input type="text" id="pass" placeholder="Ví dụ: 1605">
        
        <label>Lời nhắn gửi (Tối đa 300 chữ):</label>
        <textarea id="msg" rows="3" maxlength="300" placeholder="Lời chúc ngọt ngào..." oninput="updateCount()"></textarea>
        <div id="charCount" style="text-align: right; font-size: 0.8rem; color: #888; margin-top: 5px;">0/100</div>
                
        <label>Chữ rơi (cách nhau dấu phẩy):</label>
        <input type="text" id="falling" placeholder="Yêu anh, Thương anh...">

        <button onclick="generate()">Tạo Mã QR & Link</button>

        <div id="result">
            <div id="qrcode"></div>
            <div class="link-display" id="linkText"></div>
            
            <button class="copy-btn" onclick="copyLink()">📋 Sao chép Link gửi người ấy</button>
            <button class="download-btn" onclick="downloadQR()">💾 Tải mã QR về máy</button>
        </div>
    </div>

    <script>
        let finalGeneratedUrl = "";
// 1. Hàm đếm số chữ (Bạn dán ở đây)
    function updateCount() {
        const msg = document.getElementById('msg').value;
        const count = document.getElementById('charCount');
        count.innerText = msg.length + "/300";
        
        // Đổi màu đỏ khi sắp hết chữ cho dễ nhìn
        if (msg.length >= 290) {
            count.style.color = "red";
        } else {
            count.style.color = "#888";
        }
    }
        function generate() {
            const d = document.getElementById('date').value;
            const p = document.getElementById('pass').value;
            const m = encodeURIComponent(document.getElementById('msg').value);
            const f = encodeURIComponent(document.getElementById('falling').value || "Love, Miss You");

            if(!d || !p || !m) return alert("Điền đủ thông tin nhé!");

            let base = window.location.href.split('?')[0].split('#')[0];
            if (base.endsWith('index.html')) base = base.replace('index.html', '');
            if (!base.endsWith('/')) base += '/';

            finalGeneratedUrl = `${base}letter.html?d=${d}&p=${p}&m=${m}&f=${f}`;

            // Hiển thị một đoạn link ngắn cho đẹp
            document.getElementById('linkText').innerText = finalGeneratedUrl.substring(0, 50) + "...";

            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = "";

            // Tạo QR - Không có hình trái tim ở giữa
        const el = kjua({
            render: 'canvas',
            text: finalGeneratedUrl,
            size: 350,           // Tăng kích thước một chút cho dễ quét
            fill: '#e91e63',     // Màu hồng đậm
            back: '#ffffff',
            rounded: 0,          // Để là 0 (hình vuông) giúp máy quét đọc chữ dài tốt hơn
            quiet: 4,            // Tạo khoảng trắng xung quanh mã
            mode: 'plain'        // Chế độ 'plain' sẽ xóa bỏ hoàn toàn hình ảnh ở giữa
        });
            
            qrContainer.appendChild(el);
            document.getElementById('result').style.display = 'block';
        }

        function copyLink() {
            if (!finalGeneratedUrl) return;
            navigator.clipboard.writeText(finalGeneratedUrl).then(() => {
                alert("Đã sao chép link! Giờ bạn có thể gửi cho người ấy rồi nhé. 😘");
            });
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) return;
            const link = document.createElement('a');
            link.download = 'Ma-QR-Love.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        }
    </script>
</body>
</html>
