<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi người thương <3</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #fce4ec;
            --dark-pink: #e91e63;
            --text-gray: #5d4037;
        }

        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
        }

        #falling-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .heart, .falling-text {
            position: absolute; animation: fall linear infinite;
        }

        @keyframes bling {
            0%, 100% { filter: brightness(1); text-shadow: 0 0 5px rgba(255,255,255,0.5); }
            50% { filter: brightness(1.3); text-shadow: 0 0 15px rgba(255,255,255,0.8); }
        }

        .heart.red { color: #ff0000; animation: fall linear infinite, bling 1.5s ease-in-out infinite alternate; }
        .heart.white { color: #ffffff; animation: fall linear infinite, bling 2s ease-in-out infinite alternate-reverse; }

        .falling-text {
            color: #ff80ab; font-family: 'Dancing Script', cursive;
            white-space: nowrap; font-weight: bold;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-100px); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        .envelope-wrapper { position: relative; z-index: 10; cursor: pointer; margin-bottom: 30px; }

        .envelope {
            width: 300px; height: 200px; background: #ffffff;
            border-radius: 0 0 10px 10px; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .envelope::before {
            content: ""; position: absolute; top: -100px; left: 0;
            border-left: 150px solid transparent; border-right: 150px solid transparent;
            border-bottom: 100px solid #ffffff; z-index: 2;
        }

        .stamp {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px; background: var(--dark-pink);
            border-radius: 50%; z-index: 4;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 24px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(233, 30, 99, 0.7); }
            70% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 0 10px rgba(233, 30, 99, 0); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(233, 30, 99, 0); }
        }

        .curved-text-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 120px; z-index: 3; pointer-events: none;
        }

        .curved-text-container svg { width: 100%; height: 100%; overflow: visible; }
        .curved-text-container text { fill: var(--dark-pink); font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; }

        .couple-names {
            position: absolute; top: 68%; left: 50%; transform: translateX(-50%);
            font-family: 'Dancing Script', cursive; font-size: 1.2rem;
            color: var(--dark-pink); white-space: nowrap; font-weight: bold; z-index: 3;
        }

        .envelope-quote {
            position: absolute; top: 82%; left: 50%; transform: translateX(-50%);
            font-family: 'Dancing Script', cursive; font-size: 0.85rem;
            color: #ff80ab; white-space: nowrap; z-index: 3;
            font-style: italic; opacity: 0.9;
        }

        .letter {
            position: fixed; top: 45%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 85%; max-width: 420px; max-height: 75vh;
            background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 100; overflow-y: auto;
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; text-align: center;
        }

        .envelope-wrapper.open .letter { transform: translate(-50%, -50%) scale(1); opacity: 1; }

        .letter-content {
            font-family: 'Dancing Script', cursive; font-size: 1.3rem;
            color: var(--text-gray); line-height: 1.6;
            white-space: pre-wrap;
        }

        .spotify-container { margin-top: 20px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        .close-btn {
            margin-top: 15px; padding: 10px 25px;
            background: var(--dark-pink); border: none;
            border-radius: 25px; color: white; cursor: pointer; font-weight: bold;
        }

        .counter-container {
            position: relative; z-index: 5;
            background: rgba(255, 255, 255, 0.5);
            padding: 15px 25px; border-radius: 25px;
            text-align: center; color: var(--text-gray);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 10px;
        }

        .timer { font-size: 1.1rem; font-weight: bold; color: var(--dark-pink); }

        #password-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }

        .modal-content {
            background: white; padding: 30px; border-radius: 20px;
            text-align: center; width: 80%; max-width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .modal-content h3 { margin-top: 0; color: var(--dark-pink); font-size: 1.1rem; margin-bottom: 20px; }

        #password-input {
            width: 100%; padding: 10px; margin-bottom: 20px;
            border: 2px solid var(--primary-pink); border-radius: 10px;
            outline: none; box-sizing: border-box; text-align: center; font-size: 1rem;
        }

        .modal-buttons { display: flex; gap: 10px; justify-content: center; }
        .btn-ok { background: var(--dark-pink); color: white; border: none; padding: 8px 20px; border-radius: 15px; cursor: pointer; }
        .btn-cancel { background: #ccc; color: white; border: none; padding: 8px 20px; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="falling-container"></div>

    <div class="envelope-wrapper" id="wrapper" onclick="handleEnvelopeClick()">
        <div class="envelope">
            <div class="curved-text-container">
                <svg viewBox="0 0 100 100">
                    <path id="curve" d="M 20,50 A 30,30 0 0,1 80,50" fill="transparent" />
                    <text>
                        <textPath xlink:href="#curve" startOffset="50%" text-anchor="middle">Press this</textPath>
                    </text>
                </svg>
            </div>
            <div class="stamp">❤</div>
            <div class="couple-names">Thanks for coming</div>
            <div class="envelope-quote">“You may be out of my sight, but you’re all I see”</div>
        </div>
        
        <div class="letter">
            <div class="letter-content" id="letter-text"></div>
            <div class="spotify-container">
                <iframe 
                    data-testid="embed-iframe" 
                    style="border-radius:12px" 
                    src="https://open.spotify.com/embed/track/3y66li7DIrH7HLKIZzxR5H?utm_source=generator" 
                    width="100%" 
                    height="352" 
                    frameBorder="0" 
                    allowfullscreen="" 
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                    loading="lazy">
                </iframe>
            </div>
            <button class="close-btn" onclick="closeLetter(event)">Close</button>
        </div>
    </div> <div class="counter-container">
        <div class="counter-title">Chúng mình đã bên nhau </div>
        <div class="timer" id="timer">Đang tính...</div>
        <div style="font-size: 0.8rem; margin-top: 5px; opacity: 0.6;">from <span id="display-date">...</span></div>
    </div>

    <div id="password-modal">
        <div class="modal-content">
            <h3>Nhập mật mã để xem thư:</h3>
            <input type="text" id="password-input" placeholder="Mật mã là gì nè...">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="hidePasswordModal()">Hủy</button>
                <button class="btn-ok" onclick="checkPassword()">OK</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const dateVal = urlParams.get('d') || "2024-05-16";
        const passVal = urlParams.get('p') || "16052024";
        const msgVal = decodeURIComponent(urlParams.get('m') || "Chào bạn!");

        document.getElementById('letter-text').innerText = msgVal;
        document.getElementById('display-date').innerText = dateVal.split('-').reverse().join('/');

        const modal = document.getElementById('password-modal');
        const passInput = document.getElementById('password-input');

        function handleEnvelopeClick() {
            if (!document.getElementById('wrapper').classList.contains('open')) {
                modal.style.display = 'flex';
                passInput.focus();
            }
        }

        function hidePasswordModal() {
            modal.style.display = 'none';
            passInput.value = '';
        }

        function checkPassword() {
            if (passInput.value === passVal) {
                hidePasswordModal();
                document.getElementById('wrapper').classList.add('open');
            } else {
                alert("Sai mật mã rồi cưng ơi! 😘");
                passInput.value = '';
            }
        }

        passInput.addEventListener("keyup", (e) => { if (e.key === "Enter") checkPassword(); });
        function closeLetter(event) { event.stopPropagation(); document.getElementById('wrapper').classList.remove('open'); }

        const startDate = new Date(dateVal + "T00:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("timer").innerHTML = `${days} ngày ${hours} giờ ${minutes} phút ${seconds} giây`;
        }
        setInterval(updateTimer, 1000);

        const container = document.getElementById('falling-container');
        function createFallingItem() {
            const el = document.createElement('div');
            if (Math.random() < 0.7) {
                el.classList.add('heart', Math.random() < 0.5 ? 'red' : 'white');
                el.innerHTML = '❤';
                el.style.fontSize = (Math.random() * 15 + 15) + 'px';
            } else {
                el.classList.add('falling-text');
                el.innerHTML = "love";
                el.style.fontSize = (Math.random() * 8 + 18) + 'px';
            }
            el.style.left = Math.random() * 95 + 'vw';
            el.style.animationDuration = (Math.random() * 3 + 5) + 's';
            container.appendChild(el);
            setTimeout(() => el.remove(), 8000);
        }
        setInterval(createFallingItem, 400);
    </script>
</body>
</html>
