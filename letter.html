<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi người thương <3</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #e91e63; --text: #5d4037; }
        body { margin: 0; padding: 0; min-height: 100vh; background: #fce4ec; font-family: 'Quicksand', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Hiệu ứng rơi */
        #falling-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .heart { position: absolute; color: red; animation: fall linear infinite; }
        .falling-text { position: absolute; color: #ff80ab; font-family: 'Dancing Script', cursive; animation: fall linear infinite; white-space: nowrap; }
        @keyframes fall { 0% { transform: translateY(-100px) rotate(0); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(100vh) rotate(360deg); opacity: 0; } }

        /* Bao thư */
        .envelope-wrapper { position: relative; z-index: 10; cursor: pointer; transition: 0.5s; }
        .envelope { width: 280px; height: 180px; background: white; border-radius: 0 0 10px 10px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .envelope::before { content: ""; position: absolute; top: -90px; left: 0; border-left: 140px solid transparent; border-right: 140px solid transparent; border-bottom: 90px solid white; }
        .stamp { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: var(--pink); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 10px rgba(233,30,99,0.5); }

        /* Bức thư */
        .letter { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 85%; max-width: 400px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); z-index: 100; opacity: 0; transition: 0.6s; text-align: center; max-height: 80vh; overflow-y: auto; }
        .envelope-wrapper.open .letter { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .letter-content { font-family: 'Dancing Script', cursive; font-size: 1.4rem; color: var(--text); line-height: 1.6; white-space: pre-wrap; }
        
        /* Bộ đếm */
        .counter { position: relative; z-index: 5; margin-top: 20px; background: rgba(255,255,255,0.6); padding: 10px 20px; border-radius: 20px; text-align: center; }
        #timer { font-weight: bold; color: var(--pink); font-size: 1.1rem; }

        /* Mật khẩu */
        #pass-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: white; padding: 30px; border-radius: 20px; text-align: center; }
        input#pwd { padding: 10px; border: 2px solid #fce4ec; border-radius: 10px; width: 150px; text-align: center; outline: none; margin: 15px 0; }
    </style>
</head>
<body>
    <div id="falling-container"></div>

    <div class="envelope-wrapper" id="wrapper" onclick="openModal()">
        <div class="envelope"><div class="stamp">❤️</div></div>
        <div class="letter">
            <div class="letter-content" id="msg-text"></div>
            <div style="margin-top:20px">
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/3y66li7DIrH7HLKIZzxR5H?utm_source=generator" width="100%" height="352" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
            <button onclick="closeLetter(event)" style="margin-top:15px; border:none; background:var(--pink); color:white; padding:10px 20px; border-radius:20px;">Đóng</button>
        </div>
    </div>

    <div class="counter">
        <p>Chúng mình đã bên nhau:</p>
        <div id="timer">Đang tính...</div>
    </div>

    <div id="pass-modal">
        <div class="modal-box">
            <h3>Nhập mật mã để xem thư:</h3>
            <input type="text" id="pwd" placeholder="???"> <br>
            <button onclick="checkPass()" style="background:var(--pink); color:white; border:none; padding:8px 20px; border-radius:15px;">Xác nhận</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const dateVal = params.get('d') || "2024-05-16";
        const passVal = params.get('p') || "1234";
        const msgVal = decodeURIComponent(params.get('m') || "Yêu em!");
        const fallVal = decodeURIComponent(params.get('f') || "Love, Miss You");
        const fallArr = fallVal.split(',').map(t => t.trim());

        document.getElementById('msg-text').innerText = msgVal;

        function openModal() { if(!document.getElementById('wrapper').classList.contains('open')) document.getElementById('pass-modal').style.display = 'flex'; }
        function checkPass() { if(document.getElementById('pwd').value === passVal) { document.getElementById('pass-modal').style.display = 'none'; document.getElementById('wrapper').classList.add('open'); } else { alert("Sai mật mã!"); } }
        function closeLetter(e) { e.stopPropagation(); document.getElementById('wrapper').classList.remove('open'); }

        // Đếm ngày
        function updateTimer() {
            const diff = new Date() - new Date(dateVal);
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer').innerText = `${d} ngày ${h} giờ ${m} phút ${s} giây`;
        }
        setInterval(updateTimer, 1000);

        // Chữ rơi
        const container = document.getElementById('falling-container');
        function spawn() {
            const el = document.createElement('div');
            if(Math.random() > 0.5) {
                el.className = 'heart'; el.innerHTML = '❤️';
                el.style.fontSize = Math.random() * 20 + 10 + 'px';
            } else {
                el.className = 'falling-text'; el.innerHTML = fallArr[Math.floor(Math.random()*fallArr.length)];
                el.style.fontSize = Math.random() * 10 + 15 + 'px';
            }
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = Math.random() * 3 + 4 + 's';
            container.appendChild(el);
            setTimeout(() => el.remove(), 7000);
        }
        setInterval(spawn, 400);
    </script>
</body>
</html>
